<script>
// ═══════════════ 数据 ═══════════════
const SCHOOL = {name:"杭州十三中",grade:1132,quota2026:229,zhonggaoRate:0.2864,yougaoRate:0.71};
const CALIBRATION = {grade7Total:500,grade8Total:520,grade9aTotal:620,mockTotal:620};

const SCHOOLS = [
  // ═══ 重高（老牌）— 按2025分数线排序 ═══

  {n:"浙大附玉泉",cat:"重高（老牌）",plan:576,q:11,r:230,cutoff:620,note:"浙大资源"},
  {n:"长河高中",cat:"重高（老牌）",plan:528,q:11,r:295,cutoff:619,note:"可捡漏"},
  {n:"杭高钱江",cat:"重高（老牌）",plan:480,q:7,r:306,cutoff:617,note:"杭高集团"},
  // ═══ 重高守门员 ═══
  {n:"杭师大附中",cat:"重高守门员",plan:528,q:13,r:250,cutoff:617,note:"师范底子"},
  // ═══ 重高（特定） ═══
  {n:"学军海创园",cat:"重高（特定）",plan:480,q:6,r:350,cutoff:615,note:"学军集团"},
  {n:"杭高钱塘",cat:"优高",plan:480,q:10,r:370,cutoff:null,note:"杭高集团"},
  {n:"杭二钱江",cat:"重高（特定）",plan:432,q:4,r:380,cutoff:615,note:"杭二集团"},
  {n:"杭高临平",cat:"优高",plan:432,q:4,r:420,cutoff:null,note:"杭高集团新校"},
  // ═══ 2026 新增重高 ═══
  {n:"杭二高新",cat:"重高（2026新）",plan:864,q:9,r:310,cutoff:null,note:"2026新增 · 杭二集团 · 重点考察"},
  {n:"浙大附实验",cat:"重高（2026新）",plan:672,q:7,r:null,cutoff:null,note:"2026新增 · 浙大资源"},
  // ═══ 优高 ═══
  {n:"十四康桥",cat:"优高（头部）",plan:432,q:8,r:400,cutoff:612,note:"优高头部"},
  {n:"浙大附丁兰",cat:"优高",plan:432,q:7,r:430,cutoff:null,note:"浙大附分校"},
  {n:"杭四江东",cat:"优高",plan:432,q:7,r:460,cutoff:null,note:"杭四集团"},
  {n:"杭二富春",cat:"优高",plan:432,q:4,r:480,cutoff:null,note:"杭二集团"},
  {n:"杭二东河",cat:"优高",plan:432,q:5,r:500,cutoff:null,note:"杭二集团"},
  {n:"学军桐庐",cat:"优高",plan:432,q:4,r:500,cutoff:null,note:"学军集团"},
  {n:"十四青山湖",cat:"优高",plan:432,q:4,r:520,cutoff:null,note:"十四中分校"},
  {n:"长河二高",cat:"优高",plan:432,q:10,r:550,cutoff:null,note:"长河分校"},
  {n:"源清中学",cat:"优高",plan:480,q:8,r:600,cutoff:null,note:"拱墅区优高"},
  {n:"杭七转塘",cat:"优高",plan:480,q:5,r:650,cutoff:null,note:"美术特色"},
  {n:"杭师大附二中",cat:"优高",plan:432,q:8,r:680,cutoff:null,note:""},
  {n:"杭四吴山",cat:"优高",plan:432,q:4,r:750,cutoff:null,note:""},
  {n:"源清二高",cat:"优高",plan:432,q:7,r:700,cutoff:null,note:"源清分校"},
  {n:"绿城育华",cat:"优高",plan:200,q:2,r:800,cutoff:null,note:"民办 26000/学期"},
];

// ═══════════════ 核心算法 ═══════════════

function parseInput(id) {
  const v = document.getElementById(id).value.trim();
  if (!v) return null;
  const p = v.split("/");
  if (p.length < 2) return null;
  return {score:parseFloat(p[0]),total:parseInt(p[1]),rank:p.length>=3?parseInt(p[2]):null};
}

function computeInternalRank(inputs) {
  // 2026新规：分配生只看分数+年排，不用多学期加权
  return {internal: 0}; // 仅保留占位，不再使用复杂公式
}

function predictScore(inputs) {
  // 中考分数接近九上（得分率极高），模考更多是排名参考
  // 有九上用九上，否则取模考均值
  let baseScore = 0, count = 0;

  if (inputs.e9a) {
    const sc = inputs.e9a.total <= 620 ? inputs.e9a.score + 30 : inputs.e9a.score;
    baseScore = sc; count = 1;
  }

  // 一模二模三模微调（±5分范围内修正）
  [inputs.e1a, inputs.e2a, inputs.e3a].forEach(d => {
    if (d && d.rank) {
      const sc = d.total <= 620 ? d.score + 30 : d.score;
      if (count === 0) { baseScore = sc; count = 1; }
      else { baseScore = baseScore * 0.7 + sc * 0.3; } // 九上为主，模考微调
    }
  });

  const score = count > 0 ? Math.round(baseScore) : Math.round(0.75 * 650);
  return {score, low: score - 8, high: score + 8, pct: score / 650};
}

function predictRank(inputs, score) {
  // 排名预测：以输入校排为准，分数仅做兜底
  const ranks = [inputs.e9a, inputs.e1a, inputs.e2a, inputs.e3a]
    .filter(d => d && d.rank).map(d => d.rank);

  if (ranks.length === 0) {
    return Math.round(SCHOOL.grade * (1 - score / 650));
  }

  // 取最近一次模考排名（最后填的那个）
  return ranks[ranks.length - 1];
}

// ═══════════════ 冲重高 / 稳优高 定制算法 ═══════════════
function genQuotaPlans(rank) {
  // 分配生激进策略：十三中竞争激烈，保守=浪费机会
  // 5个志愿全力冲刺，只留最后一个兜底
  const plans = [];
  const quotaLine = SCHOOL.quota2026; // 229名
  const zhonggaoLine = Math.round(SCHOOL.grade * SCHOOL.zhonggaoRate); // 324名

  // 只取有校排参考+有名额的学校，按质量排序（r越小越好）
  const ranked = SCHOOLS.filter(s => s.r !== null && s.q > 0).sort((a,b) => a.r - b.r);

  // 找到学生排名附近的"天花板"：第一个 r <= rank 的学校（最好能摸到的）
  let ceilingIdx = ranked.findIndex(s => s.r >= rank);
  if (ceilingIdx === -1) ceilingIdx = ranked.length - 1;

  // 激进窗口：从天花板往前3所（更好但需搏）+ 天花板 + 往后取满5
  const startIdx = Math.max(0, ceilingIdx - 3);
  const candidates = ranked.slice(startIdx, startIdx + 8); // 多取几个备选

  // 取差距±80名以内的学校，不硬凑5个
  const maxGap = 80;
  const inRange = candidates.filter(s => Math.abs(s.r - rank) <= maxGap);
  // 按学校质量重排（好的在前）
  inRange.sort((a,b) => a.r - b.r);

  const selected = inRange.slice(0, 5);

  selected.forEach((s, i) => {
    const gap = s.r - rank; // 正=你领先参考位次, 负=你落后
    let tier;
    if (i === 0)             tier = "🔴 搏上限";    // 最好的，全力搏
    else if (i <= 2)         tier = "🟠 冲";         // 前3冲
    else if (i === 3)        tier = "🟡 冲稳";       // 第4过渡
    else                     tier = "🟢 兜底";        // 最后一个保底

    plans.push({...s, tier, priority: i, gap,
      advice: tier === "🔴 搏上限" ? "梦想校，发挥好就是你的" :
              tier === "🟠 冲" ? "竞争激烈但值得搏" :
              tier === "🟡 冲稳" ? "正常发挥大概率进" :
              "防线校，稳住心态"});
  });

  // 确保最后一个确实是安全校
  if (plans.length === 5 && plans[4].r > rank + 30) {
    plans[4].tier = "🟢 兜底";
    plans[4].advice = "防线校，稳住心态";
  }

  return plans;
}

function genCentralPlans(inputs, histBest, histWorst) {
  // 集中招生：以三年历史最高/最低排名定志愿上下限
  // 上限放第3志愿，下限放第8志愿
  // 优先用模考排名区间，叠加三年历史极值作为参考
  const examRanks = [inputs.e9a, inputs.e1a, inputs.e2a, inputs.e3a]
    .filter(d => d && d.rank).map(d => d.rank);
  
  const bestRank = histBest || (examRanks.length ? Math.min(...examRanks) : null);
  const worstRank = histWorst || (examRanks.length ? Math.max(...examRanks) : null);
  
  if (!bestRank || !worstRank) return [];

  // 按 r（校排参考）排序的学校列表（只取有 r 值的）
  const ranked = SCHOOLS.filter(s => s.r !== null).sort((a,b) => a.r - b.r);

  // 上限：bestRank 能进入的最好学校 → 第3志愿
  const upperCandidates = ranked.filter(s => s.r >= bestRank);
  const upperSchool = upperCandidates[0] || ranked[ranked.length-1];

  // 下限：worstRank 也能稳进的学校 → 第8志愿
  const lowerCandidates = ranked.filter(s => s.r >= worstRank);
  const lowerSchool = lowerCandidates[0] || ranked[ranked.length-1];

  // 构建 10 个志愿
  const plans = [];
  const used = new Set();

  function addPlan(school, pos, tier, advice) {
    if (!school || used.has(school.n)) return;
    used.add(school.n);
    plans.push({...school, pos, tier, advice, gap: school.r ? school.r - bestRank : null});
  }

  // 找到 upperSchool 和 lowerSchool 在 ranked 中的索引
  const upperIdx = ranked.findIndex(s => s.n === upperSchool.n);
  const lowerIdx = ranked.findIndex(s => s.n === lowerSchool.n);

  // #1-2: 高于上限的冲一冲（upperIdx 之前的学校，逆序取最近2个）
  const stretch = ranked.slice(0, upperIdx).reverse().slice(0, 2);
  stretch.forEach((s, i) => addPlan(s, i+1, "🔴 冲", "超常发挥有望"));

  // #3: 上限学校
  addPlan(upperSchool, 3, "🟡 冲稳", `最高排名(${bestRank}名)可达`);

  // #4-7: 上下限之间的梯度（均匀取4所）
  if (upperIdx < lowerIdx) {
    const middle = ranked.slice(upperIdx + 1, lowerIdx);
    const step = Math.max(1, Math.floor(middle.length / 4));
    for (let i = 0; i < 4 && i * step < middle.length; i++) {
      addPlan(middle[i * step], 4 + i, "🟢 稳", "正常发挥区间");
    }
  }

  // #8: 下限学校
  addPlan(lowerSchool, 8, "🟢 保", `最低排名(${worstRank}名)也稳`);

  // #9-10: 保底不低过头——最多比下限多取2所，且不超过当前模考排名+120
  const examRanks2 = [inputs.e9a, inputs.e1a, inputs.e2a, inputs.e3a]
    .filter(d => d && d.rank).map(d => d.rank);
  const curLevel = examRanks2.length ? examRanks2[examRanks2.length - 1] : worstRank;
  const safety = ranked.slice(lowerIdx + 1).filter(s => s.r <= curLevel + 120).slice(0, 2);
  safety.forEach((s, i) => addPlan(s, 9 + i, "🟢 保底", "绝对安全"));

  return plans.slice(0, 10);
}

// ═══════════════ UI ═══════════════
function analyze() {
  const inputs = {
    e9a: parseInput("e9a"), e1a: parseInput("e1a"),
    e2a: parseInput("e2a"), e3a: parseInput("e3a"),
  };

  // Demo if empty
  if (!inputs.e1a && !inputs.e2a) {
    document.getElementById("e9a").value = "584/620/399";
    document.getElementById("e1a").value = "558/620/480";
    document.getElementById("e2a").value = "586/620/390";
    document.getElementById("e3a").value = "590/620/380";
    document.getElementById("bestRank").value = "215";
    document.getElementById("worstRank").value = "591";
    return analyze();
  }

  const strategy = document.getElementById("strategy").value;

  // 1. 校内分配生得分
  const internalRank = computeInternalRank(inputs);
  // 2. 中考分数预测
  const pred = predictScore(inputs);
  // 3. 排名预测
  const rank = predictRank(inputs, pred.score);

  // 3b. 集中招生排名区间（模考 + 历史极值）
  const examRanks = [inputs.e9a, inputs.e1a, inputs.e2a, inputs.e3a]
    .filter(d => d && d.rank).map(d => d.rank);
  const rankBest = examRanks.length ? Math.min(...examRanks) : rank;
  const rankWorst = examRanks.length ? Math.max(...examRanks) : rank;
  const histBest = parseInt(document.getElementById("bestRank").value) || null;
  const histWorst = parseInt(document.getElementById("worstRank").value) || null;

  // 显示 - 排名为中心
  document.getElementById("predCard").style.display = "block";
  document.getElementById("predRank").textContent = `第 ${rank} 名`;
  document.getElementById("predScore").textContent = `估测 ${pred.score - 30} / 620 (±8分) | 排名区间 ${rankBest}~${rankWorst}`;

  const quotaNeeded = Math.round(SCHOOL.grade * SCHOOL.zhonggaoRate);
  document.getElementById("zhonggaoChance").textContent =
    rank <= quotaNeeded * 0.7 ? "80%+" :
    rank <= quotaNeeded * 1.0 ? "60-80%" :
    rank <= quotaNeeded * 1.3 ? "35-60%" : "<35%";
  document.getElementById("quotaPos").textContent =
    rank <= SCHOOL.quota2026 ? `分配生区内` : "集中招生";

  document.getElementById("benchmark").innerHTML = `
    📌 <strong>排名对照</strong>:
    重高线: 前${quotaNeeded}名(28.6%) |
    分配生总名额: ${SCHOOL.quota2026}个（含重高+优高）
    <br>📌 <strong>集中招生区间</strong>: 最高排名${rankBest} → 上限第3志愿 | 最低排名${rankWorst} → 下限第8志愿
    ${histBest ? `<br>📌 <strong>三年历史</strong>: 🏆最高${histBest}名 | ⚠️最低${histWorst}名 → 志愿上下限以此为准` : ''}
    <br>📌 <strong>2026新规</strong>: 分配生只看中考分数+年排，平行志愿投档
  `;

  // 生成方案
  document.getElementById("plansArea").style.display = "block";
  const quotaPlans = genQuotaPlans(rank);
  const centralPlans = genCentralPlans(inputs, histBest, histWorst);
  renderPlans("quotaPlans", quotaPlans);
  renderPlans("centralPlans", centralPlans);

  // 提醒
  document.getElementById("reminder").style.display = "block";
  document.getElementById("reminderText").innerHTML = `
    • 填报: 5月29日 8:00 ~ 5月30日 18:00 (www.hzjyks.net) · 不可修改<br>
    • 分配生需综评3A + 连续三年在读<br>
    • 同分排序: 语文数学 → 英语 → 科学 → 社会<br>
    • 任何预测有误差，建议上下浮动5-10分作为安全区间<br>
    • 一模最重要(难度最大)，二模定档次，三模稳心态<br>
  `;
}

function renderPlans(id, plans) {
  const container = document.getElementById(id);
  if (!plans.length) { container.innerHTML='<div class="plan-item"><div class="plan-info" style="text-align:center;color:#999;padding:16px">暂无匹配方案</div></div>'; return; }
  container.innerHTML = plans.map((p,i)=>{
    const pos = p.pos || (i+1);
    const cls = p.tier && p.tier.includes("冲") ? "dream" : p.tier && p.tier.includes("保") ? "safe" : "risky";
    const tc = cls === "dream" ? "tag-dream" : cls === "risky" ? "tag-risky" : "tag-safe";
    const gapInfo = p.gap !== null && p.gap !== undefined ? (p.gap > 0 ? `+${p.gap}名` : `${p.gap}名`) : "—";
    return `<div class="plan-item">
      <div class="plan-num ${cls}">${pos}</div>
      <div class="plan-info">
        <div class="school">${p.n} <span style="font-size:11px;color:#999">${p.cat}·${p.tier||""}级</span></div>
        <div class="detail">名额: ${p.q||p.plan}人 | 校排参考: 前${p.r||"?"}名 | 差距: ${gapInfo}${p.cutoff ? ` | 分数线: ${p.cutoff}` : ''}</div>
        <div class="detail" style="color:#666">${p.advice||p.note}</div>
      </div>
      <div class="plan-tag ${tc}">${p.tier}</div>
    </div>`;
  }).join("");
}

function switchTab(t) {
  document.querySelectorAll(".tab").forEach((b,i)=>b.classList.toggle("active",(t==="quota"&&i===0)||(t==="central"&&i===1)));
  document.getElementById("quotaPlans").style.display = t==="quota"?"block":"none";
  document.getElementById("centralPlans").style.display = t==="central"?"block":"none";
}

window.onload = () => {
  document.querySelectorAll("input, select").forEach(el => el.addEventListener("input", analyze));
  analyze();
};
</script>
</body>
</html>
