<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>杭州2026中考志愿填报 · 十三中专属</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f5;color:#333;line-height:1.6}
.container{max-width:720px;margin:0 auto;padding:16px}
.header{background:linear-gradient(135deg,#1a73e8,#0d47a1);color:#fff;padding:24px 16px;text-align:center;border-radius:0 0 16px 16px}
.header h1{font-size:22px;margin-bottom:4px}
.header p{font-size:13px;opacity:.85}
.card{background:#fff;border-radius:12px;padding:20px;margin:16px 0;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.card h2{font-size:17px;margin-bottom:12px;color:#1a73e8;border-bottom:2px solid #e3f2fd;padding-bottom:8px}
.row{display:flex;gap:12px;flex-wrap:wrap}
.col{flex:1;min-width:140px}
label{display:block;font-size:13px;color:#666;margin-bottom:4px}
input,select{width:100%;padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:15px;transition:border .2s}
input:focus{border-color:#1a73e8;outline:none}
.btn{background:#1a73e8;color:#fff;border:none;padding:12px 24px;border-radius:8px;font-size:16px;cursor:pointer;width:100%;margin-top:12px}
.btn:hover{background:#1557b0}
.pred-box{background:#e3f2fd;border-radius:8px;padding:16px;text-align:center;margin-top:12px}
.pred-box .score{font-size:36px;font-weight:bold;color:#1a73e8}
.pred-box .range{font-size:13px;color:#666}
.pred-box .rank{font-size:14px;color:#333;margin-top:8px}
.plan-item{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid #f0f0f0;gap:12px}
.plan-item:last-child{border-bottom:none}
.plan-num{width:28px;height:28px;border-radius:50%;background:#1a73e8;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;flex-shrink:0}
.plan-num.safe{background:#2e7d32}
.plan-num.risky{background:#f57c00}
.plan-num.dream{background:#c62828}
.plan-info{flex:1}
.plan-info .school{font-size:15px;font-weight:600}
.plan-info .detail{font-size:12px;color:#888;margin-top:2px}
.plan-tag{font-size:11px;padding:3px 8px;border-radius:4px;font-weight:bold;white-space:nowrap}
.tag-safe{background:#e8f5e9;color:#2e7d32}
.tag-risky{background:#fff3e0;color:#e65100}
.tag-dream{background:#fce4ec;color:#c62828}
.tabs{display:flex;gap:0;margin-bottom:0}
.tab{padding:10px 16px;background:#eee;border:none;cursor:pointer;font-size:14px;flex:1;text-align:center;border-radius:8px 8px 0 0}
.tab.active{background:#1a73e8;color:#fff}
.footer{text-align:center;font-size:12px;color:#999;padding:16px;margin-top:8px}
.chart-bar{height:6px;background:#e0e0e0;border-radius:3px;margin-top:4px;overflow:hidden}
.chart-fill{height:100%;border-radius:3px;transition:width .5s}
.fill-high{background:#2e7d32}
.fill-mid{background:#f57c00}
.fill-low{background:#c62828}
.note{font-size:12px;color:#e65100;background:#fff3e0;padding:8px 12px;border-radius:8px;margin-top:8px}
.placeholder-text{text-align:center;color:#999;padding:24px;font-size:15px}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🎓 杭州2026中考志愿填报</h1>
    <p>杭州十三中（教育集团）专属 · 基于官方政策数据</p>
  </div>

  <!-- 输入区 -->
  <div class="card">
    <h2>📝 输入成绩（至少2次考试）</h2>
    <div class="row">
      <div class="col">
        <label>九上期末 (分/总分/校排)</label>
        <input id="e1" placeholder="如 520/620/310" type="text">
      </div>
      <div class="col">
        <label>一模 (分/总分/校排)</label>
        <input id="e2" placeholder="如 535/620/285" type="text">
      </div>
    </div>
    <div class="row" style="margin-top:8px">
      <div class="col">
        <label>二模 (分/总分/校排)</label>
        <input id="e3" placeholder="如 548/620/260" type="text">
      </div>
      <div class="col">
        <label>三模 (可选)</label>
        <input id="e4" placeholder="如 560/620/240" type="text">
      </div>
    </div>
    <div class="row" style="margin-top:12px">
      <div class="col">
        <label>目标策略偏好</label>
        <select id="strategy">
          <option value="balanced">平衡型（推荐）</option>
          <option value="aggressive">进取型（激进冲高）</option>
          <option value="safe">保守型（稳妥优先）</option>
        </select>
      </div>
    </div>
    <button class="btn" onclick="analyze()">🔮 生成志愿方案</button>
  </div>

  <!-- 预测结果 -->
  <div class="card" id="predCard" style="display:none">
    <h2>🔮 成绩预测</h2>
    <div class="pred-box">
      <div class="score" id="predScore">--</div>
      <div class="range" id="predRange"></div>
      <div class="rank">校内排名: <strong id="predRank">--</strong> | 估测全市: <strong id="predCity">--</strong></div>
      <div class="rank" style="font-size:12px;color:#888;margin-top:4px" id="predTrend"></div>
    </div>
    <div class="row" style="margin-top:12px">
      <div class="col" style="text-align:center">
        <div style="font-size:12px;color:#888">重高率</div>
        <div style="font-size:20px;font-weight:bold;color:#2e7d32" id="zhonggaoChance">--</div>
      </div>
      <div class="col" style="text-align:center">
        <div style="font-size:12px;color:#888">优高率</div>
        <div style="font-size:20px;font-weight:bold;color:#1a73e8" id="yougaoChance">--</div>
      </div>
      <div class="col" style="text-align:center">
        <div style="font-size:12px;color:#888">分配生竞争</div>
        <div style="font-size:20px;font-weight:bold;color:#e65100" id="quotaPos"></div>
      </div>
    </div>
  </div>

  <!-- 方案 Tabs -->
  <div id="plansArea" style="display:none">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('quota')">🎯 分配生 (5个方案)</button>
      <button class="tab" onclick="switchTab('central')">📝 集中招生 (10个方案)</button>
    </div>
    <div class="card" id="quotaPlans" style="border-radius:0 0 12px 12px"></div>
    <div class="card" id="centralPlans" style="display:none;border-radius:0 0 12px 12px"></div>
  </div>

  <div class="note" id="reminder" style="display:none"></div>

  <div class="footer">
    数据来源：杭州教育发布 · 2026年4月官方公告<br>
    仅供志愿填报参考，具体以学校最终公示名额为准
  </div>
</div>

<script>
// ═══════════════ 数据层 ═══════════════
const POLICY = {
  cityGraduates: 44500, quotaTotal: 9021, totalScore: 650,
  quotaMax: 5, centralMax: 10,
  applyDate: "5月29日 8:00 ~ 5月30日 18:00",
  systemUrl: "www.hzjyks.net"
};

const SCHOOL = {
  name: "杭州十三中（教育集团）", gradeSize: 1132,
  quota2026: 229, zhonggaoRate: 0.2864, yougaoRate: 0.71
};

// 学校数据（配额 + 2025录取校内排名参考）
const SCHOOLS = [
  {n:"杭二中滨江", cat:"重高",tier:"S",plan:672,q:12,r:15,note:"杭州最顶尖"},
  {n:"学军中学西溪",cat:"重高",tier:"S",plan:672,q:12,r:27,note:"竞赛强校"},
  {n:"杭高贡院",cat:"重高",tier:"A",plan:624,q:12,r:73,note:"百年名校"},
  {n:"十四凤起",cat:"重高",tier:"A",plan:576,q:11,r:159,note:"理科强校"},
  {n:"学军紫金港",cat:"重高",tier:"A",plan:480,q:7,r:111,note:"学军新校区"},
  {n:"杭四下沙",cat:"重高",tier:"A",plan:624,q:11,r:210,note:"国际化特色"},
  {n:"浙大附玉泉",cat:"重高",tier:"B",plan:576,q:11,r:230,note:"浙大资源"},
  {n:"长河高中",cat:"重高",tier:"B",plan:528,q:11,r:295,note:"可捡漏"},
  {n:"杭高钱江",cat:"重高",tier:"B",plan:480,q:7,r:306,note:"可捡漏3分"},
  {n:"杭师附中",cat:"重高",tier:"B",plan:528,q:13,r:250,note:"师范底子"},
  {n:"杭二高新",cat:"重高",tier:"B",plan:864,q:9,r:null,note:"2026新增"},
  {n:"浙大附实验",cat:"重高",tier:"B",plan:672,q:7,r:null,note:"2026新增"},
  {n:"学军海创园",cat:"重高",tier:"C",plan:480,q:6,r:350,note:"学军集团"},
  {n:"杭二钱江",cat:"重高",tier:"C",plan:432,q:4,r:380,note:"杭二集团"},
  {n:"杭高钱塘",cat:"重高",tier:"C",plan:480,q:10,r:370,note:"杭高集团"},
  {n:"杭高临平",cat:"重高",tier:"C",plan:432,q:4,r:420,note:"杭高集团"},
  {n:"十四康桥",cat:"重高",tier:"C",plan:432,q:8,r:400,note:"十四中分校"},
  {n:"浙大附丁兰",cat:"重高",tier:"C",plan:432,q:7,r:430,note:"浙大附分校"},
  {n:"杭四江东",cat:"重高",tier:"C",plan:432,q:7,r:450,note:"杭四集团"},
  {n:"杭二东河",cat:"重高",tier:"C",plan:432,q:5,r:500,note:"杭二集团"},
  {n:"杭二富春",cat:"重高",tier:"C",plan:432,q:4,r:480,note:"杭二集团"},
  {n:"学军桐庐",cat:"重高",tier:"C",plan:432,q:4,r:500,note:"学军集团"},
  {n:"十四青山湖",cat:"重高",tier:"C",plan:432,q:4,r:520,note:"十四中分校"},
  {n:"长河二高",cat:"重高",tier:"C",plan:432,q:10,r:550,note:"长河分校"},
  {n:"源清中学",cat:"优高",tier:"C",plan:480,q:8,r:600,note:"拱墅区优高"},
  {n:"杭七转塘",cat:"优高",tier:"C",plan:480,q:5,r:650,note:"美术特色"},
  {n:"杭师大附二中",cat:"优高",tier:"C",plan:432,q:8,r:680,note:"杭师附分校"},
  {n:"源清二高",cat:"优高",tier:"C",plan:432,q:7,r:700,note:"源清分校"},
  {n:"杭四吴山",cat:"优高",tier:"D",plan:432,q:4,r:750,note:"杭四分校"},
  {n:"绿城育华",cat:"优高",tier:"D",plan:200,q:2,r:800,note:"民办 26000/学期"},
];

// ═══════════════ 核心计算 ═══════════════
function parseExams() {
  const exams = [];
  const inputs = [
    {id:"e1",name:"九上期末"}, {id:"e2",name:"一模"},
    {id:"e3",name:"二模"}, {id:"e4",name:"三模"}
  ];
  for (let inp of inputs) {
    const v = document.getElementById(inp.id).value.trim();
    if (!v) continue;
    const p = v.split("/");
    if (p.length >= 3) {
      exams.push({
        name: inp.name,
        score: parseFloat(p[0]),
        total: parseInt(p[1]),
        rank: parseInt(p[2]),
        pct: parseFloat(p[0]) / parseInt(p[1])
      });
    }
  }
  return exams;
}

function predict(exams) {
  if (exams.length < 2) return null;
  if (exams.length === 3 && exams[0].name === "九上期末" && exams[1].name === "一模" && exams[2].name === "二模") {
    // Pre-set demo data
  }
  
  const n = exams.length;
  const xs = exams.map((_, i) => i);
  const ys = exams.map(e => e.pct);
  
  let sx = 0, sy = 0, sxy = 0, sx2 = 0;
  for (let i = 0; i < n; i++) {
    sx += xs[i]; sy += ys[i]; sxy += xs[i] * ys[i]; sx2 += xs[i] * xs[i];
  }
  
  const slope = (n * sxy - sx * sy) / (n * sx2 - sx * sx);
  const intercept = (sy - slope * sx) / n;
  const predPct = intercept + slope * n;
  
  // RMSE for confidence interval
  let ssr = 0;
  for (let i = 0; i < n; i++) {
    const err = ys[i] - (intercept + slope * xs[i]);
    ssr += err * err;
  }
  const rmse = Math.sqrt(ssr / n);
  const ciLow = Math.max(0.3, predPct - 2 * rmse);
  const ciHigh = Math.min(0.99, predPct + 2 * rmse);
  
  // Rank prediction
  const ranks = exams.map(e => e.rank);
  let rankSlope = 0;
  if (ranks.length >= 2) {
    let dsum = 0;
    for (let i = 0; i < ranks.length - 1; i++) dsum += ranks[i] - ranks[i+1];
    rankSlope = dsum / (ranks.length - 1);
  }
  const predRank = Math.max(1, Math.round(ranks[ranks.length-1] + rankSlope * 0.5));
  
  const cityAdv = SCHOOL.zhonggaoRate / 0.178;
  const predCityPct = (predRank / SCHOOL.gradeSize) / cityAdv;
  
  return {
    trend: slope > 0.005 ? "上升 📈" : slope < -0.005 ? "需关注 📉" : "稳定 ➡️",
    score: Math.round(predPct * 650),
    ciLow: Math.round(ciLow * 650),
    ciHigh: Math.round(ciHigh * 650),
    rank: predRank,
    cityPct: (predCityPct * 100).toFixed(1),
    slope: slope
  };
}

function genQuotaPlans(rank, strategy) {
  const plans = [];
  for (let s of SCHOOLS) {
    if (!s.r || s.q <= 0) continue;
    const diff = s.r - rank;
    let tag, prob, cls;
    if (rank <= s.r * 0.7) { tag = "🟢 稳"; prob = "高 >70%"; cls = "safe"; }
    else if (rank <= s.r * 1.0) { tag = "🟡 冲"; prob = "中 40-70%"; cls = "risky"; }
    else if (rank <= s.r * 1.4) { tag = "🔴 博"; prob = "低 15-40%"; cls = "dream"; }
    else continue;
    plans.push({...s, tag, prob, cls, diff});
  }
  
  const order = {"🟢 稳":0, "🟡 冲":1, "🔴 博":2};
  plans.sort((a,b) => order[a.tag] - order[b.tag] || b.diff - a.diff);
  
  if (strategy === "aggressive") {
    const r = plans.filter(p => p.cls === "risky" || p.cls === "dream");
    const s = plans.filter(p => p.cls === "safe");
    return [...r, ...s].slice(0, POLICY.quotaMax);
  }
  if (strategy === "safe") {
    return plans.filter(p => p.cls === "safe").slice(0, POLICY.quotaMax);
  }
  return plans.slice(0, POLICY.quotaMax);
}

function genCentralPlans(rank) {
  const cityAdv = SCHOOL.zhonggaoRate / 0.178;
  const cityPct = (rank / SCHOOL.gradeSize) / cityAdv;
  const plans = [];
  
  for (let s of SCHOOLS) {
    const refRank = s.r || 999;
    const scPct = refRank / SCHOOL.gradeSize / cityAdv;
    let tag, prob, cls;
    if (cityPct < scPct * 0.7) { tag = "🟢 保"; prob = ">85%"; cls = "safe"; }
    else if (cityPct < scPct * 1.0) { tag = "🟡 稳"; prob = "55-85%"; cls = "safe"; }
    else if (cityPct < scPct * 1.3) { tag = "🟠 冲"; prob = "25-55%"; cls = "risky"; }
    else continue;
    plans.push({...s, tag, prob, cls});
  }
  
  plans.sort((a,b) => (a.r||999) - (b.r||999));
  return plans.slice(0, POLICY.centralMax);
}

// ═══════════════ UI ═══════════════
function analyze() {
  const exams = parseExams();
  
  // 无输入时用示例数据
  let dataExams = exams;
  if (exams.length < 2) {
    dataExams = [
      {name:"九上期末",score:520,total:620,rank:310,pct:520/620},
      {name:"一模",score:535,total:620,rank:285,pct:535/620},
      {name:"二模",score:548,total:620,rank:260,pct:548/620},
    ];
    document.getElementById("e1").value = "520/620/310";
    document.getElementById("e2").value = "535/620/285";
    document.getElementById("e3").value = "548/620/260";
  }

  const pred = predict(dataExams);
  if (!pred) return;

  const strategy = document.getElementById("strategy").value;

  // 显示预测
  document.getElementById("predCard").style.display = "block";
  document.getElementById("predScore").textContent = pred.score + " / 650";
  document.getElementById("predRange").textContent = `置信区间: ${pred.ciLow} ~ ${pred.ciHigh} 分`;
  document.getElementById("predRank").textContent = `第 ${pred.rank} 名`;
  document.getElementById("predCity").textContent = `前 ${pred.cityPct}%`;
  document.getElementById("predTrend").textContent = `成绩趋势: ${pred.trend}`;

  // 概率指标
  const zhonggaoRank = SCHOOL.gradeSize * SCHOOL.zhonggaoRate;
  if (pred.rank <= zhonggaoRank * 0.8) {
    document.getElementById("zhonggaoChance").textContent = "80%+";
  } else if (pred.rank <= zhonggaoRank * 1.1) {
    document.getElementById("zhonggaoChance").textContent = "55-80%";
  } else if (pred.rank <= zhonggaoRank * 1.5) {
    document.getElementById("zhonggaoChance").textContent = "30-55%";
  } else {
    document.getElementById("zhonggaoChance").textContent = "<30%";
  }
  
  document.getElementById("yougaoChance").textContent = pred.rank <= SCHOOL.gradeSize * 0.6 ? "85%+" : "70%+";
  
  const quotaRankNeeded = SCHOOL.quota2026;
  document.getElementById("quotaPos").textContent = pred.rank <= quotaRankNeeded ? 
    `分配生区内 (${Math.round(pred.rank/quotaRankNeeded*100)}%)` : `需集中招生`;

  // 生成方案
  const quotaPlans = genQuotaPlans(pred.rank, strategy);
  const centralPlans = genCentralPlans(pred.rank);

  document.getElementById("plansArea").style.display = "block";
  renderPlans("quotaPlans", quotaPlans, "quota");
  renderPlans("centralPlans", centralPlans, "central");

  // 提醒
  document.getElementById("reminder").style.display = "block";
  document.getElementById("reminder").innerHTML = `
    ⚠️ <strong>重要提醒</strong><br>
    • 填报时间: ${POLICY.applyDate}<br>
    • 填报入口: ${POLICY.systemUrl} （填报后不可修改）<br>
    • 分配生需综评3A + 连续三年在读<br>
    • 同分排序: 语文数学 → 英语 → 科学 → 社会<br>
    • 5月初关注学校公示的正式分配方案<br>
    • 新增学校（杭二高新、浙大附实验）无历史数据，参考位次为估算
  `;
}

function renderPlans(id, plans, type) {
  const container = document.getElementById(id);
  if (plans.length === 0) {
    container.innerHTML = '<div class="placeholder-text">暂无匹配方案，请调整成绩输入</div>';
    return;
  }
  
  let html = "";
  plans.forEach((p, i) => {
    const numCls = p.cls === "dream" ? "dream" : p.cls === "risky" ? "risky" : "safe";
    const tagCls = p.cls === "dream" ? "tag-dream" : p.cls === "risky" ? "tag-risky" : "tag-safe";
    const typeLabel = type === "quota" ? `名额: ${p.q}人` : `计划: ${p.plan}人`;
    const refLabel = p.r ? `参考位次: 前${p.r}名(2025)` : "2026新增，参考位次待定";
    
    html += `
      <div class="plan-item">
        <div class="plan-num ${numCls}">${i+1}</div>
        <div class="plan-info">
          <div class="school">${p.n} <span style="font-size:12px;color:#888">${p.cat}·${p.tier}级</span></div>
          <div class="detail">${typeLabel} | ${refLabel} | ${p.prob}</div>
          <div class="detail" style="color:#666">${p.note}</div>
        </div>
        <div class="plan-tag ${tagCls}">${p.tag}</div>
      </div>
    `;
  });
  container.innerHTML = html;
}

function switchTab(tab) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  if (tab === "quota") {
    document.querySelectorAll(".tab")[0].classList.add("active");
    document.getElementById("quotaPlans").style.display = "block";
    document.getElementById("centralPlans").style.display = "none";
  } else {
    document.querySelectorAll(".tab")[1].classList.add("active");
    document.getElementById("quotaPlans").style.display = "none";
    document.getElementById("centralPlans").style.display = "block";
  }
}

// 页面加载时自动运行示例
window.onload = () => analyze();
</script>

</body>
</html>
